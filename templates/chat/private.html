{% extends "base.html" %}

{% block title %}Приватные сообщения | Книжный магазин{% endblock %}

{% block content %}
<style>
    .private-chat-container {
        background: #f8f9fa;
        border-radius: 15px;
        overflow: hidden;
        height: calc(100vh - 200px);
        display: flex;
    }
    .users-sidebar {
        width: 300px;
        background: white;
        border-right: 1px solid #dee2e6;
        display: flex;
        flex-direction: column;
    }
    .users-list {
        flex: 1;
        overflow-y: auto;
    }
    .chat-main {
        flex: 1;
        display: flex;
        flex-direction: column;
    }
    .chat-header {
        background: white;
        padding: 15px 20px;
        border-bottom: 1px solid #dee2e6;
    }
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
    }
    .chat-input-area {
        background: white;
        padding: 15px 20px;
        border-top: 1px solid #dee2e6;
    }
    .user-item {
        padding: 12px 15px;
        cursor: pointer;
        transition: all 0.3s;
        border-bottom: 1px solid #f0f0f0;
    }
    .user-item:hover {
        background: #f8f9fa;
    }
    .user-item.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    .user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
    }
    .user-avatar.admin {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    .message-bubble {
        max-width: 70%;
        margin-bottom: 15px;
    }
    .message-bubble.sent {
        margin-left: auto;
    }
    .message-bubble.sent .message-content {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 18px 18px 5px 18px;
    }
    .message-bubble.received .message-content {
        background: white;
        border-radius: 18px 18px 18px 5px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .search-users {
        padding: 15px;
        border-bottom: 1px solid #dee2e6;
    }
    .search-result {
        position: absolute;
        background: white;
        border-radius: 10px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        z-index: 1000;
        max-height: 300px;
        overflow-y: auto;
        display: none;
    }
    .search-result-item {
        padding: 10px 15px;
        cursor: pointer;
    }
    .search-result-item:hover {
        background: #f8f9fa;
    }
</style>

<section class="chat-section py-3">
    <div class="container-fluid px-4">
        <div class="private-chat-container">
            <!-- Список пользователей -->
            <div class="users-sidebar">
                <div class="search-users">
                    <div class="position-relative">
                        <input type="text" id="userSearch" class="form-control" 
                               placeholder="Поиск пользователей...">
                        <div id="searchResults" class="search-result w-100"></div>
                    </div>
                </div>
                <div class="users-list" id="usersList">
                    <div class="text-muted text-center py-3">
                        <i class="bi bi-chat-dots"></i>
                        <p class="small mt-2">Выберите пользователя для начала диалога</p>
                    </div>
                </div>
            </div>

            <!-- Область чата -->
            <div class="chat-main">
                <div class="chat-header" id="chatHeader">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-person-circle fs-4 me-2 text-muted"></i>
                        <span class="text-muted">Выберите пользователя</span>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-chat-text fs-1"></i>
                        <p class="mt-3">Выберите пользователя из списка слева<br>чтобы начать общение</p>
                    </div>
                </div>
                <div class="chat-input-area" style="display: none;" id="chatInputArea">
                    <div class="input-group">
                        <input type="text" class="form-control" id="privateMessageInput" 
                               placeholder="Введите сообщение..." autocomplete="off">
                        <button class="btn btn-primary" id="sendPrivateBtn">
                            <i class="bi bi-send"></i> Отправить
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    let currentChatUser = null;
    let messagePolling = null;

    // Загрузка списка пользователей для чата
    async function loadUsers() {
        // Здесь можно загрузить пользователей, с которыми уже был диалог
        // Для простоты показываем поле поиска
    }

    // Поиск пользователей
    const searchInput = document.getElementById('userSearch');
    const searchResults = document.getElementById('searchResults');

    searchInput.addEventListener('input', async function() {
        const query = this.value.trim();
        if (query.length < 2) {
            searchResults.style.display = 'none';
            return;
        }
        
        try {
            const response = await fetch(`/chat/users/search?q=${encodeURIComponent(query)}`);
            const users = await response.json();
            
            if (users.length > 0) {
                searchResults.innerHTML = users.map(user => `
                    <div class="search-result-item" data-user-id="${user.id}">
                        <div class="d-flex align-items-center">
                            <div class="user-avatar ${user.is_admin ? 'admin' : ''} me-2" style="width: 35px; height: 35px; font-size: 0.8rem;">
                                ${user.name.split(' ').map(n => n[0]).join('')}
                            </div>
                            <div>
                                <div><strong>${escapeHtml(user.name)}</strong></div>
                                <small class="text-muted">${escapeHtml(user.email)}</small>
                            </div>
                        </div>
                    </div>
                `).join('');
                searchResults.style.display = 'block';
                
                document.querySelectorAll('.search-result-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const userId = parseInt(item.dataset.userId);
                        const userName = item.querySelector('strong').textContent;
                        startChatWithUser(userId, userName);
                        searchResults.style.display = 'none';
                        searchInput.value = '';
                    });
                });
            } else {
                searchResults.innerHTML = '<div class="p-3 text-muted text-center">Пользователи не найдены</div>';
                searchResults.style.display = 'block';
            }
        } catch (error) {
            console.error('Search error:', error);
        }
    });

    // Закрытие результатов поиска при клике вне
    document.addEventListener('click', function(e) {
        if (!searchResults.contains(e.target) && e.target !== searchInput) {
            searchResults.style.display = 'none';
        }
    });

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function startChatWithUser(userId, userName) {
        currentChatUser = { id: userId, name: userName };
        
        // Обновляем заголовок
        document.getElementById('chatHeader').innerHTML = `
            <div class="d-flex align-items-center">
                <div class="user-avatar me-2" style="width: 40px; height: 40px;">
                    ${userName.split(' ').map(n => n[0]).join('')}
                </div>
                <div>
                    <strong>${escapeHtml(userName)}</strong>
                </div>
            </div>
        `;
        
        // Показываем область ввода
        document.getElementById('chatInputArea').style.display = 'block';
        
        // Загружаем историю сообщений
        await loadPrivateMessages(userId);
        
        // Начинаем polling для новых сообщений
        if (messagePolling) clearInterval(messagePolling);
        messagePolling = setInterval(() => loadPrivateMessages(userId, true), 3000);
    }

    async function loadPrivateMessages(userId, isPolling = false) {
        try {
            const response = await fetch(`/chat/private/api/${userId}`);
            const data = await response.json();
            
            const messagesContainer = document.getElementById('chatMessages');
            
            if (!isPolling) {
                messagesContainer.innerHTML = '';
            }
            
            if (data.messages.length === 0 && !isPolling) {
                messagesContainer.innerHTML = `
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-chat-text fs-1"></i>
                        <p class="mt-3">Нет сообщений. Напишите что-нибудь!</p>
                    </div>
                `;
            } else {
                // Если это polling, проверяем, нужно ли добавлять новые сообщения
                if (isPolling) {
                    const existingMessages = messagesContainer.querySelectorAll('.message-bubble');
                    if (existingMessages.length !== data.messages.length) {
                        messagesContainer.innerHTML = '';
                        data.messages.forEach(msg => {
                            addPrivateMessageToDOM(msg);
                        });
                    }
                } else {
                    data.messages.forEach(msg => {
                        addPrivateMessageToDOM(msg);
                    });
                }
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        } catch (error) {
            console.error('Error loading messages:', error);
        }
    }

    function addPrivateMessageToDOM(msg) {
        const messagesContainer = document.getElementById('chatMessages');
        
        if (messagesContainer.querySelector(`[data-msg-id="${msg.id}"]`)) return;
        
        const messageDiv = document.createElement('div');
        messageDiv.className = `message-bubble ${msg.is_mine ? 'sent' : 'received'}`;
        messageDiv.setAttribute('data-msg-id', msg.id);
        
        messageDiv.innerHTML = `
            <div class="message-content p-2 px-3 d-inline-block">
                <div class="small mb-1 ${msg.is_mine ? 'text-white-50' : 'text-muted'}">
                    ${msg.is_mine ? 'Вы' : escapeHtml(msg.sender_name)}
                </div>
                <div>${escapeHtml(msg.message)}</div>
                <div class="small mt-1 ${msg.is_mine ? 'text-white-50' : 'text-muted'}" style="font-size: 0.7rem;">
                    ${msg.created_at}
                </div>
            </div>
        `;
        
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Отправка приватного сообщения
    async function sendPrivateMessage() {
        if (!currentChatUser) return;
        
        const input = document.getElementById('privateMessageInput');
        const message = input.value.trim();
        if (!message) return;
        
        const formData = new FormData();
        formData.append('receiver_id', currentChatUser.id);
        formData.append('message', message);
        
        try {
            const response = await fetch('/chat/private/send', {
                method: 'POST',
                body: formData
            });
            
            if (response.redirected || response.ok) {
                input.value = '';
                await loadPrivateMessages(currentChatUser.id);
            }
        } catch (error) {
            console.error('Error sending message:', error);
        }
    }

    document.getElementById('sendPrivateBtn').addEventListener('click', sendPrivateMessage);
    document.getElementById('privateMessageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendPrivateMessage();
    });

    // Очистка polling при уходе
    window.addEventListener('beforeunload', () => {
        if (messagePolling) clearInterval(messagePolling);
    });
</script>
{% endblock %}
