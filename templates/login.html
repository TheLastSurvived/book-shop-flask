{% extends "base.html" %}

{% block title %}Вход | Книжный магазин "Мир книг"{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2><i class="bi bi-person-circle me-2"></i>Вход в аккаунт</h2>
                        <p class="text-muted">Введите ваши данные для входа</p>
                    </div>
                    <div class="auth-body">
                        <form method="post" action="{{ url_for('login') }}" class="auth-form">
                            <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
                            
                            <div class="form-group">
                                <label for="email" class="form-label">Email адрес</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" name="email" 
                                           placeholder="Введите ваш email" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="password" class="form-label">Пароль</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" 
                                           placeholder="Введите ваш пароль" required>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="remember">
                                    <label class="form-check-label" for="remember">
                                        Запомнить меня
                                    </label>
                                </div>
                                <a href="#" class="text-decoration-none">Забыли пароль?</a>
                            </div>

                            <button type="submit" class="btn auth-btn w-100">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                            </button>

                            <div class="auth-links text-center mt-4">
                                <p class="mb-0">Нет аккаунта? 
                                    <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold">
                                        Зарегистрируйтесь
                                    </a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
